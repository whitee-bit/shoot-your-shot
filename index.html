<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shoot Your Shot — RACES Checker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f5f4f0;min-height:100vh;padding:1rem;}
.screen{display:none;max-width:760px;margin:0 auto;padding:1.5rem 1rem 3rem;}
.screen.active{display:block;}
.hd1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:#1a1a1a;line-height:1;}
.hd2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1.5px;color:#1a1a1a;line-height:1;}
.sub{font-size:13px;color:#666;margin-top:3px;}
.pill{background:#f0ede8;border:0.5px solid rgba(0,0,0,0.12);border-radius:999px;padding:5px 14px;font-size:13px;color:#666;font-weight:600;display:inline-block;}
.pill span{font-size:15px;font-weight:700;color:#1a1a1a;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.btn-p{background:#185FA5;color:white;border:none;border-radius:8px;padding:11px 20px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;transition:background .15s,transform .1s;}
.btn-p:hover{background:#0C447C;}.btn-p:active{transform:scale(.98);}.btn-p:disabled{background:#e0ddd8;color:#aaa;cursor:not-allowed;}
.btn-s{background:transparent;border:0.5px solid rgba(0,0,0,0.25);border-radius:8px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#555;cursor:pointer;transition:background .15s;}
.btn-s:hover{background:#f0ede8;}
.txt-in{width:100%;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:9px 14px;font-family:'Nunito',sans-serif;font-size:15px;color:#1a1a1a;background:#f0ede8;outline:none;}
.txt-in:focus{border-color:#185FA5;background:#fff;}
.lbl{font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px;}
#login-screen{text-align:center;}
.login-card{max-width:420px;margin:2rem auto 0;}
.class-btns{display:flex;flex-direction:column;gap:10px;margin:1.25rem 0;}
.class-btn{padding:14px 20px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:#1a1a1a;text-align:left;transition:border-color .2s,background .2s;}
.class-btn:hover{border-color:#185FA5;background:#E6F1FB;}
.class-btn.selected{border-color:#185FA5;background:#E6F1FB;color:#0C447C;}
.class-badge{font-size:11px;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:999px;margin-left:8px;}
.badge-std{background:#FAEEDA;color:#633806;}
.badge-hon{background:#E6F1FB;color:#0C447C;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:8px;flex-wrap:wrap;}
.score-bar{display:flex;gap:6px;flex-wrap:wrap;}
.round-tracker{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:.75rem;}
.rdot{width:9px;height:9px;border-radius:50%;background:#e0ddd8;border:0.5px solid #bbb;transition:background .2s;}
.rdot.done{background:#1D9E75;border-color:#1D9E75;}
.rdot.active{background:#185FA5;border-color:#185FA5;}
.banner{display:none;text-align:center;padding:8px;border-radius:8px;margin-bottom:.75rem;font-size:13px;font-weight:600;}
.banner.visible{display:block;}
.banner-green{background:#EAF3DE;color:#27500A;}
.banner-red{background:#FCEBEB;color:#791F1F;}
.banner-blue{background:#E6F1FB;color:#0C447C;}
.theme-badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;}
.theme-bball{background:#FAEEDA;color:#633806;}
.theme-shamrock{background:#EAF3DE;color:#27500A;}
.theme-honors{background:#E6F1FB;color:#0C447C;}
.passage-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#999;}
.passage-text{font-size:14px;line-height:1.75;color:#1a1a1a;margin:8px 0 12px;}
.q-box{background:#f0ede8;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;color:#1a1a1a;border-left:3px solid #378ADD;}
.honors-note{font-size:12px;color:#185FA5;font-style:italic;margin-top:6px;}
.races-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:1rem;}
.r-row{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;overflow:hidden;}
.r-row:focus-within{border-color:#185FA5;}
.r-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px 0;}
.r-ltr{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;min-width:20px;}
.r-ltr.R{color:#E24B4A;}.r-ltr.A{color:#EF9F27;}.r-ltr.C{color:#1D9E75;}.r-ltr.E{color:#378ADD;}.r-ltr.S{color:#D4537E;}
.r-name{font-size:13px;font-weight:600;color:#666;flex:1;}
.r-st{font-size:12px;font-weight:600;padding:2px 8px;border-radius:999px;}
.st-empty{background:#f0ede8;color:#aaa;}
.st-ok{background:#EAF3DE;color:#27500A;}
.st-short{background:#FAEEDA;color:#633806;}
.r-ta{width:100%;border:none;outline:none;background:transparent;padding:6px 12px 8px;font-family:'Nunito',sans-serif;font-size:14px;color:#1a1a1a;resize:none;line-height:1.6;min-height:56px;}
.r-hint{padding:0 12px 7px;font-size:12px;color:#aaa;font-style:italic;line-height:1.4;}
.trans-blank-wrap{padding:6px 12px 0;}
.trans-blank-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#aaa;margin-bottom:4px;}
.trans-blank-row{display:flex;align-items:center;gap:8px;}
.trans-blank-in{flex:1;border:none;border-bottom:1.5px solid rgba(0,0,0,0.2);border-radius:0;padding:4px 6px;font-family:'Nunito',sans-serif;font-size:14px;color:#1a1a1a;background:transparent;outline:none;}
.trans-blank-in:focus{border-bottom-color:#185FA5;}
.trans-blank-st{font-size:13px;min-width:16px;}
.trans-divider{height:0.5px;background:rgba(0,0,0,0.08);margin:8px 12px 0;}
.smm-block{padding:4px 12px 10px;display:flex;flex-direction:column;gap:6px;}
.smm-row{display:flex;align-items:center;gap:8px;}
.smm-lbl{font-size:12px;font-weight:700;min-width:58px;padding:3px 8px;border-radius:999px;text-align:center;}
.smm-says{background:#E6F1FB;color:#0C447C;}
.smm-means{background:#FAEEDA;color:#633806;}
.smm-matters{background:#EAF3DE;color:#27500A;}
.smm-in{flex:1;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:13px;color:#1a1a1a;background:#f0ede8;outline:none;}
.smm-in:focus{border-color:#185FA5;background:#fff;}
.smm-st{font-size:14px;min-width:16px;}
.action-row{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.results-card{display:none;}.results-card.visible{display:block;}
.big-score{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;}
.shot-lbl{font-size:16px;font-weight:700;margin-top:4px;}
.shot-sub{font-size:13px;color:#666;margin-top:2px;}
.swish{color:#1D9E75;}.bank{color:#378ADD;}.brick{color:#EF9F27;}.airball{color:#E24B4A;}
.pb-wrap{height:6px;background:#f0ede8;border-radius:999px;overflow:hidden;margin:.75rem 0;}
.pb-fill{height:100%;border-radius:999px;transition:width .6s ease;}
.pb-g{background:#1D9E75;}.pb-a{background:#EF9F27;}.pb-r{background:#E24B4A;}
.fb-list{display:flex;flex-direction:column;gap:6px;}
.fb-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.5;}
.fb-pass{background:#EAF3DE;color:#174304;}.fb-warn{background:#FAEEDA;color:#412402;}.fb-fail{background:#FCEBEB;color:#501313;}
.sb-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:.75rem;}
.sb-item{text-align:center;padding:7px 2px;border-radius:8px;background:#f0ede8;}
.sb-ltr{font-family:'Bebas Neue',sans-serif;font-size:13px;line-height:1;}
.gate-note{background:#FAEEDA;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:#412402;margin-top:.75rem;display:none;text-align:center;}
.gate-note.visible{display:block;}
#lb-screen{text-align:center;}
.lb-filter{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem;}
.lb-filter-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:999px;padding:6px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#555;cursor:pointer;}
.lb-filter-btn.active{background:#185FA5;color:white;border-color:#185FA5;}
.lb-list{display:flex;flex-direction:column;gap:8px;max-width:500px;margin:0 auto;}
.lb-row{display:flex;align-items:center;gap:12px;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:12px 16px;}
.lb-nick{flex:1;font-size:15px;font-weight:600;color:#1a1a1a;text-align:left;}
.lb-cbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;}
.lb-score{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#1a1a1a;}
.lb-bar-wrap{width:70px;height:6px;background:#f0ede8;border-radius:999px;overflow:hidden;}
.lb-bar-fill{height:100%;border-radius:999px;background:#185FA5;}
.lb-empty{color:#aaa;font-size:14px;padding:2rem;}
.lb-live{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#1D9E75;font-weight:600;margin-top:6px;justify-content:center;}
.lb-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#teacher-screen .tv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.tv-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tv-tab{background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:#555;cursor:pointer;}
.tv-tab.active{background:#185FA5;color:white;border-color:#185FA5;}
.tv-panel{display:none;}.tv-panel.active{display:block;}
.tv-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem;}
.tv-metric{background:#f0ede8;border-radius:8px;padding:1rem;text-align:center;}
.tv-metric .num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#1a1a1a;line-height:1;}
.tv-metric .lbl-sm{font-size:12px;color:#666;margin-top:4px;}
.class-filter{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.cf-btn{background:transparent;border:0.5px solid rgba(0,0,0,0.2);border-radius:999px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:#555;cursor:pointer;}
.cf-btn.active{background:#185FA5;color:white;border-color:#185FA5;}
.roster-table{width:100%;border-collapse:collapse;font-size:13px;}
.roster-table th{text-align:left;padding:8px 8px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#aaa;border-bottom:0.5px solid rgba(0,0,0,0.1);}
.roster-table td{padding:8px 8px;border-bottom:0.5px solid rgba(0,0,0,0.07);color:#1a1a1a;}
.roster-table tr:hover td{background:#f0ede8;}
.sc-chip{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;}
.sc-hi{background:#EAF3DE;color:#27500A;}.sc-mid{background:#FAEEDA;color:#633806;}.sc-lo{background:#FCEBEB;color:#791F1F;}
.rbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.rbar-track{flex:1;height:10px;background:#f0ede8;border-radius:999px;overflow:hidden;}
.rbar-fill{height:100%;border-radius:999px;}
.rbar-pct{font-size:12px;font-weight:600;color:#666;min-width:36px;text-align:right;}
.strug-tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;margin:3px;background:#FCEBEB;color:#791F1F;}
.resp-card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.resp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;cursor:pointer;}
.resp-body{display:none;}.resp-body.open{display:block;}
.resp-item{font-size:13px;line-height:1.6;margin-bottom:4px;color:#1a1a1a;}
.note-box{background:#f0ede8;border-radius:8px;padding:12px 16px;font-size:13px;color:#555;line-height:1.7;margin-bottom:1rem;}
.pin-screen{max-width:340px;margin:3rem auto 0;text-align:center;}
.pin-error{color:#E24B4A;font-size:13px;margin-top:8px;min-height:18px;}
.score-note{font-size:11px;color:#aaa;text-align:center;margin-bottom:.75rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="login-screen">
  <div class="login-card card">
    <div style="text-align:center;margin-bottom:1.25rem;">
      <div class="hd1">Shoot Your Shot</div>
      <div class="sub">RACES Checker — March Madness Edition</div>
    </div>
    <div style="margin-bottom:1rem;">
      <label class="lbl">Your name</label>
      <input class="txt-in" id="login-name" placeholder="First name + last initial" maxlength="40"/>
    </div>
    <div style="margin-bottom:1.25rem;">
      <label class="lbl">Select your class</label>
      <div class="class-btns">
        <div class="class-btn" onclick="selectClass('p1',this)">Period 1 <span class="class-badge badge-std">Standard</span></div>
        <div class="class-btn" onclick="selectClass('p3',this)">Period 3 <span class="class-badge badge-hon">Honors</span></div>
        <div class="class-btn" onclick="selectClass('p4',this)">Period 4 <span class="class-badge badge-std">Standard</span></div>
      </div>
    </div>
    <button class="btn-p" style="width:100%;font-size:18px;" onclick="startGame()">Let's go!</button>
    <div style="text-align:center;margin-top:.75rem;display:flex;gap:8px;justify-content:center;">
      <button class="btn-s" style="font-size:12px;" onclick="go('lb-screen');renderLB('all');">Leaderboard</button>
      <button class="btn-s" style="font-size:12px;" onclick="go('teacher-gate');">Teacher view</button>
    </div>
  </div>
</div>

<!-- TEACHER GATE -->
<div class="screen" id="teacher-gate">
  <div class="pin-screen card">
    <div class="hd2" style="margin-bottom:.5rem;">Teacher access</div>
    <div class="sub" style="margin-bottom:1.25rem;">Enter your passcode to continue</div>
    <input class="txt-in" id="pin-input" type="password" placeholder="Passcode" maxlength="40"
      style="text-align:center;font-size:16px;letter-spacing:2px;margin-bottom:.5rem;"
      onkeydown="if(event.key==='Enter')checkPin()"/>
    <div class="pin-error" id="pin-error"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:1rem;">
      <button class="btn-p" style="font-size:18px;" onclick="checkPin()">Enter</button>
      <button class="btn-s" onclick="go('login-screen')">Back</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div class="top-bar">
    <div class="score-bar">
      <div class="pill">Round <span id="g-round">1</span> of 5</div>
      <div class="pill">Score: <span id="g-score">0</span></div>
      <div class="pill">Streak: <span id="g-streak">0</span></div>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn-s" style="font-size:12px;" onclick="go('lb-screen');renderLB('all');">Leaderboard</button>
    </div>
  </div>
  <div class="round-tracker" id="g-tracker"></div>
  <div class="banner banner-green" id="b-streak"></div>
  <div class="banner banner-red" id="b-retry"></div>
  <div class="banner banner-blue" id="b-honors"></div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
      <div class="passage-label">Read the passage</div>
      <div class="theme-badge" id="g-theme"></div>
    </div>
    <div class="passage-text" id="g-text"></div>
    <div class="q-box" id="g-q"></div>
    <div class="honors-note" id="g-hnote" style="display:none;"></div>
  </div>
  <div class="score-note" id="g-score-note"></div>
  <div class="races-grid" id="g-races"></div>
  <div class="action-row">
    <button class="btn-p" id="g-submit" onclick="checkAnswer()">Shoot!</button>
    <button class="btn-s" onclick="clearAll()">Clear</button>
    <button class="btn-s" onclick="toggleHints()">Hint</button>
  </div>
  <div class="card results-card" id="g-results">
    <div style="text-align:center;margin-bottom:1rem;">
      <div class="big-score" id="g-rscore"></div>
      <div class="shot-lbl" id="g-rlbl"></div>
      <div class="shot-sub" id="g-rsub"></div>
    </div>
    <div class="pb-wrap"><div class="pb-fill" id="g-pb" style="width:0%"></div></div>
    <div class="fb-list" id="g-fb"></div>
    <div style="margin-top:.75rem;">
      <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:6px;">This round</div>
      <div class="sb-grid" id="g-sb"></div>
    </div>
    <div class="gate-note" id="g-gate"></div>
    <div style="display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap;">
      <button class="btn-p" id="g-next" style="font-size:18px;">Next passage</button>
      <button class="btn-s" onclick="go('lb-screen');renderLB('all');">Leaderboard</button>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="lb-screen">
  <div style="text-align:center;margin-bottom:1.25rem;">
    <div class="hd1">Leaderboard</div>
    <div class="sub">Live — updates as students submit</div>
    <div class="lb-live"><div class="lb-dot"></div>Live</div>
  </div>
  <div class="lb-filter">
    <button class="lb-filter-btn active" onclick="renderLB('all');setLBF(this)">All</button>
    <button class="lb-filter-btn" onclick="renderLB('p1');setLBF(this)">Period 1</button>
    <button class="lb-filter-btn" onclick="renderLB('p3');setLBF(this)">Period 3</button>
    <button class="lb-filter-btn" onclick="renderLB('p4');setLBF(this)">Period 4</button>
  </div>
  <div class="lb-list" id="lb-list"></div>
  <div style="text-align:center;margin-top:1.25rem;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button class="btn-s" onclick="go('game-screen')">Back to game</button>
    <button class="btn-s" onclick="go('login-screen')">Home</button>
  </div>
</div>

<!-- TEACHER -->
<div class="screen" id="teacher-screen">
  <div class="tv-hdr">
    <div class="hd2">Teacher Dashboard</div>
    <div style="display:flex;gap:8px;">
      <button class="btn-s" style="font-size:12px;" onclick="exportSummary()">Export</button>
      <button class="btn-s" style="font-size:12px;" onclick="go('login-screen')">Home</button>
    </div>
  </div>
  <div class="tv-tabs">
    <button class="tv-tab active" onclick="tvTab('overview',this)">Overview</button>
    <button class="tv-tab" onclick="tvTab('roster',this)">Roster</button>
    <button class="tv-tab" onclick="tvTab('struggles',this)">RACES breakdown</button>
    <button class="tv-tab" onclick="tvTab('responses',this)">Full responses</button>
  </div>
  <div id="tv-overview" class="tv-panel active"></div>
  <div id="tv-roster" class="tv-panel"></div>
  <div id="tv-struggles" class="tv-panel"></div>
  <div id="tv-responses" class="tv-panel"></div>
</div>

<script>
const CLASSES={p1:{label:'Period 1',honors:false},p3:{label:'Period 3',honors:true},p4:{label:'Period 4',honors:false}};
const PASS_GATE_STD=8,PASS_GATE_HON=9,MAX_PTS=14;
const RACES_DEF=[
  {key:'R',name:'Restate the question',hint:'Begin by restating the question in your own words as a statement.',pts:2},
  {key:'A',name:'Answer the question',hint:'Clearly answer the question being asked.',pts:2},
  {key:'TC',name:'Transition before evidence',hint:'Write a transition phrase that introduces your evidence (e.g. "For example," or "According to the text,").',isTransC:true,pts:2},
  {key:'C',name:'Cite evidence',hint:'Use a direct quote or specific detail from the passage.',pts:2},
  {key:'E',name:'Explain your evidence',hint:'Use Says, Means, and Matters to break down your evidence.',smm:true,pts:2},
  {key:'TS',name:'Transition before summary',hint:'Write a transition phrase that signals your closing sentence (e.g. "In conclusion," or "Overall,").',isTransS:true,pts:2},
  {key:'S',name:'Summarize / So what?',hint:'Wrap up with a strong closing sentence that connects back to your answer.',pts:2}
];
const BAR_COLORS={R:'#E24B4A',A:'#EF9F27',TC:'#1D9E75',C:'#1D9E75',E:'#378ADD',TS:'#D4537E',S:'#D4537E'};

const STD_PROMPTS=[
  {theme:'March Madness',themeClass:'theme-bball',passage:`Every March, college basketball fans go wild for the NCAA Tournament — nicknamed "March Madness." 68 teams compete in a single-elimination bracket, meaning one loss and you're done. Cinderella stories happen every year, when a small, underdog school shocks a powerhouse program. In 2018, UMBC became the first 16-seed ever to beat a 1-seed, stunning Virginia in one of the greatest upsets in sports history. Coaches say that in March, talent matters less than heart, hustle, and believing in yourself.`,question:'According to the passage, why are upsets so common in the NCAA Tournament?'},
  {theme:"St. Patrick's Day",themeClass:'theme-shamrock',passage:`St. Patrick's Day is celebrated every March 17th to honor Saint Patrick, the patron saint of Ireland. According to legend, Patrick used the three-leaf shamrock to explain the Christian concept of the Trinity to the Irish people. Today, millions of people around the world wear green, attend parades, and celebrate Irish culture. The holiday is especially popular in cities like Chicago, which famously dyes its river green, and New York City, which holds one of the largest St. Patrick's Day parades in the world.`,question:'What is the significance of the shamrock according to the passage?'},
  {theme:'March Madness',themeClass:'theme-bball',passage:`Brackets are a huge part of the March Madness experience. Before the tournament begins, millions of fans fill out prediction brackets, guessing which team will win each game. The odds of a perfect bracket are approximately 1 in 9.2 quintillion. Despite the impossibility, people keep trying. Bracket challenges bring friends, families, and coworkers together and make even the most casual fans root for teams they've never heard of.`,question:"According to the passage, what effect do bracket challenges have on people who don't usually follow basketball?"},
  {theme:"St. Patrick's Day",themeClass:'theme-shamrock',passage:`The color green is everywhere on St. Patrick's Day, but it wasn't always the holiday's signature color. In early depictions, Saint Patrick was actually shown wearing blue. Green became associated with the holiday over centuries, linked to Ireland's lush green landscape, the shamrock, and the Irish independence movement. Today, wearing green on March 17th is so common that those who forget risk getting pinched — a playful tradition practiced especially among American schoolchildren.`,question:"According to the passage, how did green become the color most associated with St. Patrick's Day?"},
  {theme:'March Madness',themeClass:'theme-bball',passage:`Being a student-athlete during March Madness is not easy. Players must balance schoolwork, practice, travel, and media attention — all while competing on a national stage. Many players describe the pressure as unlike anything they've experienced before. However, coaches and athletes agree that the experience teaches life lessons no classroom can: managing stress, performing under pressure, working as a team, and bouncing back from defeat.`,question:'According to the passage, what valuable lessons do student-athletes learn from competing in the tournament?'}

const HON_PROMPTS=[
  {theme:'Honors',themeClass:'theme-honors',passage:`The NCAA Tournament, often called "March Madness," is a single-elimination competition involving 68 college basketball teams. While raw athletic talent certainly plays a role in a team's success, sports analysts and coaches frequently argue that psychological factors — team cohesion, mental resilience, and the ability to perform under extreme pressure — may be even more decisive. The 2018 upset in which UMBC defeated Virginia, the tournament's top overall seed, is often cited as evidence that bracket predictions based purely on talent rankings can be unreliable.`,question:'What conclusion can you draw about what makes a team successful in the tournament? Use specific evidence from the passage and explain what it reveals about competition beyond just skill.'},
  {theme:'Honors',themeClass:'theme-honors',passage:`St. Patrick's Day has evolved significantly from its origins as a religious feast day in Ireland into a globally recognized cultural celebration. Historians note that Irish immigrants in the United States played a major role in transforming the holiday, using it as an opportunity to assert cultural pride and political identity during periods of widespread anti-Irish discrimination in the 19th and early 20th centuries. The tradition of dyeing Chicago's river green, begun in 1962, exemplifies how communities adapt cultural practices over time to fit new contexts.`,question:"How does the passage show that the purpose of St. Patrick's Day changed over time? What does this suggest about why people hold onto cultural traditions even as their meaning shifts?"},
  {theme:'Honors',themeClass:'theme-honors',passage:`The phenomenon of the "bracket challenge" during March Madness raises interesting questions about human psychology and decision-making. Despite near-impossible odds — approximately 1 in 9.2 quintillion for a perfect bracket — millions of people participate every year. Behavioral economists suggest that people are motivated not by a realistic expectation of winning, but by the social experience of shared competition and the emotional investment that comes from having a personal stake in unpredictable outcomes.`,question:'According to the passage, what truly motivates bracket participation? What does this suggest about what people value more — winning, or belonging? Use evidence to support your thinking.'},
  {theme:'Honors',themeClass:'theme-honors',passage:`The association between the color green and St. Patrick's Day is often taken for granted, yet the history behind it reveals how symbols gain and shift meaning over time. Saint Patrick himself was historically depicted in blue vestments, and blue remained the color associated with Irish identity for centuries. The shift to green was gradual, tied to the symbolism of the shamrock, the phrase "the Emerald Isle," and eventually, the green uniforms of Irish rebellion movements. Cultural symbols, this history suggests, are not fixed — they are negotiated and reconstructed by communities across generations.`,question:"What is the central argument the passage makes about cultural symbols? How does the history of the color green support that argument? Use evidence and explain why this matters beyond just St. Patrick's Day."},
  {theme:'Honors',themeClass:'theme-honors',passage:`Student-athletes who compete in the NCAA Tournament face a unique tension: they are expected to perform at an elite athletic level while simultaneously meeting the academic obligations of full-time college students. Critics of the NCAA system argue that the tournament's commercial success — generating over $1 billion in revenue — stands in stark contrast to the fact that athletes historically received no direct financial compensation. Supporters counter that scholarships, coaching, and national exposure provide substantial value. This debate reflects broader questions about fairness, labor, and the purpose of collegiate athletics.`,question:'What central tension does the passage identify? Using evidence from the text, explain which side of the argument you find more convincing and why. Make sure your explanation goes beyond simply restating the passage.'}

function buildRacesGrid(){const g=document.getElementById('g-races');g.innerHTML='';RACES_DEF.forEach(r=>{const row=document.createElement('div');row.className='r-row';let h='';if(r.isTransC){h=`<div class="r-hdr"><div class="r-ltr" style="color:#1D9E75;font-size:14px;font-family:'Bebas Neue',sans-serif;">T\u2192C</div><div class="r-name">${r.name}</div><div class="r-st st-empty" id="st-TC">\u2014</div></div><div class="trans-blank-wrap"><div class="trans-blank-label">Write your transition phrase</div><div class="trans-blank-row"><input class="trans-blank-in" id="inp-TC" placeholder='e.g. "For example," or "According to the text,"' maxlength="80" oninput="liveCheckTrans('TC')" /><span class="trans-blank-st" id="tst-TC"></span></div></div><div class="r-hint" id="hint-TC" style="display:none">${r.hint}</div>`;}else if(r.isTransS){h=`<div class="r-hdr"><div class="r-ltr" style="color:#D4537E;font-size:14px;font-family:'Bebas Neue',sans-serif;">T\u2192S</div><div class="r-name">${r.name}</div><div class="r-st st-empty" id="st-TS">\u2014</div></div><div class="trans-blank-wrap"><div class="trans-blank-label">Write your transition phrase</div><div class="trans-blank-row"><input class="trans-blank-in" id="inp-TS" placeholder='e.g. "In conclusion," or "Overall,"' maxlength="80" oninput="liveCheckTrans('TS')" /><span class="trans-blank-st" id="tst-TS"></span></div></div><div class="r-hint" id="hint-TS" style="display:none">${r.hint}</div>`;}else if(r.smm){h=`<div class="r-hdr"><div class="r-ltr E">E</div><div class="r-name">${r.name}</div><div class="r-st st-empty" id="st-E">\u2014</div></div><div class="smm-block"><div class="smm-row"><span class="smm-lbl smm-says">Says</span><input class="smm-in" id="smm-says" placeholder="The passage says '...'" oninput="liveSmm()" /><span class="smm-st" id="smm-says-s"></span></div><div class="smm-row"><span class="smm-lbl smm-means">Means</span><input class="smm-in" id="smm-means" placeholder="This means that..." oninput="liveSmm()" /><span class="smm-st" id="smm-means-s"></span></div><div class="smm-row"><span class="smm-lbl smm-matters">Matters</span><input class="smm-in" id="smm-matters" placeholder="This matters because..." oninput="liveSmm()" /><span class="smm-st" id="smm-matters-s"></span></div></div><div class="r-hint" id="hint-E" style="display:none">${r.hint}</div>`;}else{h=`<div class="r-hdr"><div class="r-ltr ${r.key}">${r.key}</div><div class="r-name">${r.name}</div><div class="r-st st-empty" id="st-${r.key}">\u2014</div></div><textarea class="r-ta" id="inp-${r.key}" placeholder="Write your ${r.key} here..." rows="2" oninput="liveCheck('${r.key}')"></textarea><div class="r-hint" id="hint-${r.key}" style="display:none">${r.hint}</div>`;}row.innerHTML=h;g.appendChild(row);});}
function liveCheck(k){const v=(document.getElementById('inp-'+k)||{}).value||'';const s=document.getElementById('st-'+k);if(!s)return;if(!v.trim()){s.className='r-st st-empty';s.textContent='\u2014';}else if(v.trim().split(' ').length<5){s.className='r-st st-short';s.textContent='too short';}else{s.className='r-st st-ok';s.textContent='ready';}}

function scoreKey(k,val,q,pass,smm){const words=val.trim().split(/\s+/).filter(Boolean);const wc=words.length;const v=val.toLowerCase();let pts=0,fb='',grade='fail';if(k==='R'){const qw=q.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w=>w.length>3);const ov=qw.filter(w=>v.includes(w)).length;if(wc<5){fb='Restatement too short — write a full sentence.';pts=0;}else if(ov<2){fb='Include key words from the question in your restatement.';pts=1;grade='warn';}else{fb='Great restatement!';pts=2;grade='pass';}}if(k==='A'){if(wc<5){fb='Answer too short — be more complete.';pts=0;}else if(wc<10){fb='Good start — expand your answer a bit more.';pts=1;grade='warn';}else{fb='Solid, clear answer!';pts=2;grade='pass';}}if(k==='TC'){const tc=val.trim().toLowerCase();const hasGoodPhrase=TRANS_C_PHRASES.some(p=>tc.includes(p));const wc2=tc.split(/\s+/).filter(Boolean).length;if(!tc||wc2<2){fb='Write a transition phrase before your evidence — try "For example," or "According to the text,"';pts=0;}else if(!hasGoodPhrase){fb='Good attempt! Try "For example," "According to the text," or "The passage states,"';pts=1;grade='warn';}else{fb='Perfect transition — sets up your evidence nicely!';pts=2;grade='pass';}}if(k==='C'){const hq=v.includes('"')||v.includes('\u201c')||v.includes('according to')||v.includes('the passage')||v.includes('states')||v.includes('says');const chunks=pass.toLowerCase().split(/[.,!?]/).map(s=>s.trim());const mc=chunks.some(ch=>{const cw=ch.split(/\s+/).filter(w=>w.length>4);return cw.filter(w=>v.includes(w)).length>=3;});if(wc<5){fb='Add a quote or specific detail from the passage.';pts=0;}else if(!hq&&!mc){fb='Use language directly from the passage — try quoting!';pts=1;grade='warn';}else{fb='Nice — you pulled directly from the text!';pts=2;grade='pass';}}if(k==='E'){const says=(smm.says||'').trim();const means=(smm.means||'').trim();const matters=(smm.matters||'').trim();const sOk=says.split(' ').filter(Boolean).length>=4;const mOk=means.split(' ').filter(Boolean).length>=4;const mtOk=matters.split(' ').filter(Boolean).length>=4;const mw=['means','shows','suggests','tells','explains','reveals'];const mtw=['matters','important','significant','because','therefore','this is why'];const hmw=mw.some(w=>means.toLowerCase().includes(w));const hmtw=mtw.some(w=>matters.toLowerCase().includes(w));if(!sOk||!mOk||!mtOk){fb='All three — Says, Means, and Matters — must be complete sentences.';pts=0;}else if(!hmw||!hmtw){fb='Good! Use "means/shows" in Means and "matters/because" in Matters.';pts=1;grade='warn';}else{fb='Excellent — all three components are strong!';pts=2;grade='pass';}}if(k==='TS'){const ts=val.trim().toLowerCase();const hasGoodPhrase=TRANS_S_PHRASES.some(p=>ts.includes(p));const wc2=ts.split(/\s+/).filter(Boolean).length;if(!ts||wc2<2){fb='Write a closing transition — try "In conclusion," or "Overall,"';pts=0;}else if(!hasGoodPhrase){fb='Good try! Try "In conclusion," "Overall," "Clearly," or "Therefore,"';pts=1;grade='warn';}else{fb='Great closing transition!';pts=2;grade='pass';}}if(k==='S'){if(wc<6){fb='Summary too short — add a closing thought.';pts=0;}else if(wc<12){fb='Good start! Expand your closing sentence a bit more.';pts=1;grade='warn';}else{fb='Strong closing sentence!';pts=2;grade='pass';}}return{pts,fb,grade};}
function checkAnswer(){const p=getPrompts()[state.currentRound];state.roundAttempts++;const smm={says:(document.getElementById('smm-says')||{}).value||'',means:(document.getElementById('smm-means')||{}).value||'',matters:(document.getElementById('smm-matters')||{}).value||''};const resp={};let roundPts=0;const fbs=[],sbs=[];RACES_DEF.forEach(r=>{const k=r.isTransC?'TC':r.isTransS?'TS':r.key;let v='';if(r.smm){v='Says: '+smm.says+' | Means: '+smm.means+' | Matters: '+smm.matters;}else if(r.isTransC||r.isTransS){v=(document.getElementById('inp-'+k)||{}).value||'';}else{v=(document.getElementById('inp-'+k)||{}).value||'';}resp[k]=v;const res=scoreKey(k,v,p.question,p.passage,smm);roundPts+=res.pts;fbs.push({key:k,name:r.name,...res});sbs.push({key:k,pts:res.pts,grade:res.grade});});const pg=passGate();const passed=roundPts>=pg;state.totalScore+=roundPts;const pct=Math.round(roundPts/MAX_PTS*100);if(passed){state.streak++;}else{state.streak=0;}document.getElementById('g-score').textContent=state.totalScore;document.getElementById('g-streak').textContent=state.streak;let lbl,cls,sub;if(pct>=90){lbl='Swish!';cls='swish';sub='Nothing but net!';}else if(pct>=70){lbl='Bank shot!';cls='bank';sub='Off the glass and in!';}else if(pct>=50){lbl='Brick';cls='brick';sub='Hits the rim — review your feedback!';}else{lbl='Air ball!';cls='airball';sub='No contact — go back and review RACES!';}document.getElementById('g-rscore').textContent=roundPts+'/'+MAX_PTS;document.getElementById('g-rscore').className='big-score '+cls;document.getElementById('g-rlbl').textContent=lbl;document.getElementById('g-rlbl').className='shot-lbl '+cls;document.getElementById('g-rsub').textContent=sub;const pb=document.getElementById('g-pb');pb.style.width=pct+'%';pb.className='pb-fill'+(pct>=80?' pb-g':pct>=50?' pb-a':' pb-r');const fbEl=document.getElementById('g-fb');fbEl.innerHTML='';fbs.forEach(f=>{const icon=f.grade==='pass'?'\u2713':f.grade==='warn'?'!':'\u2717';fbEl.innerHTML+='<div class="fb-item fb-'+f.grade+'"><div style="font-size:15px;flex-shrink:0;">'+icon+'</div><div><strong>'+(f.key==='TC'?'T\u2192C':f.key==='TS'?'T\u2192S':f.key)+' \u2014 '+f.name+':</strong> '+f.fb+'</div></div>';});const sbEl=document.getElementById('g-sb');sbEl.innerHTML='';sbs.forEach(s=>{const mk=s.pts===2?'\u2713\u2713':s.pts===1?'\u2713':'\u2717';const disp=s.key==='TC'?'T\u2192C':s.key==='TS'?'T\u2192S':s.key;sbEl.innerHTML+='<div class="sb-item"><div class="sb-ltr" style="color:'+BAR_COLORS[s.key]+';">'+disp+'</div><div style="font-size:12px;margin-top:2px;">'+mk+'</div><div style="font-size:10px;color:#aaa;margin-top:1px;">'+s.pts+'/2</div></div>';});if(state.streak>=2){const bs=document.getElementById('b-streak');bs.textContent=state.streak+'-response streak \u2014 keep it going!';bs.classList.add('visible');}saveRound(resp,roundPts,passed,sbs);const gate=document.getElementById('g-gate');const nxt=document.getElementById('g-next');if(!passed){gate.classList.add('visible');gate.textContent='You scored '+roundPts+'/'+MAX_PTS+' \u2014 you need '+pg+'/'+MAX_PTS+' to advance. Read the feedback, revise, and try again! (Attempt '+state.roundAttempts+')';document.getElementById('b-retry').textContent='Attempt '+state.roundAttempts+' \u2014 not quite! Revise and shoot again.';document.getElementById('b-retry').classList.add('visible');nxt.style.display='none';document.getElementById('g-submit').disabled=false;}else{gate.classList.remove('visible');document.getElementById('b-retry').classList.remove('visible');nxt.style.display='block';document.getElementById('g-submit').disabled=true;nxt.textContent=state.currentRound>=4?'See final score':'Next passage';nxt.onclick=state.currentRound>=4?showFinal:nextRound;}document.getElementById('g-results').classList.add('visible');document.getElementById('g-results').scrollIntoView({behavior:'smooth',block:'nearest'});}
function saveRound(resp,pts,passed,sbs){let s=students.find(x=>x.name===state.name&&x.classId===state.classId);if(!s){s={name:state.name,classId:state.classId,nickname:state.nickname,rounds:[]};students.push(s);}s.rounds=s.rounds.filter(r=>r.round!==state.currentRound);s.rounds.push({round:state.currentRound,score:pts,passed,responses:resp,sbs,attempts:state.roundAttempts,theme:getPrompts()[state.currentRound].theme,question:getPrompts()[state.currentRound].question});save();}

function setLBF(el){document.querySelectorAll('.lb-filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
let lbTimer=null;
function renderLB(filter){clearTimeout(lbTimer);const data=(filter==='all'?[...students]:students.filter(s=>s.classId===filter)).filter(s=>s.rounds.length>0).sort((a,b)=>getTotal(b)-getTotal(a));const list=document.getElementById('lb-list');if(!list)return;if(!data.length){list.innerHTML='<div class="lb-empty">No scores yet \u2014 be the first to shoot!</div>';return;}list.innerHTML='';const maxTotal=MAX_PTS*5;data.forEach((s,i)=>{const tot=getTotal(s);const pct=Math.round(tot/maxTotal*100);const medal=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':`${i+1}`;const cl=CLASSES[s.classId];const badgeCls=cl&&cl.honors?'badge-hon':'badge-std';list.innerHTML+='<div class="lb-row"><div style="font-size:'+(i<3?'22':'16')+'px;min-width:32px;text-align:center;">'+medal+'</div><div class="lb-nick">'+s.nickname+'<span class="lb-cbadge '+badgeCls+'">'+(cl?cl.label:'')+'</span></div><div class="lb-bar-wrap"><div class="lb-bar-fill" style="width:'+pct+'%"></div></div><div class="lb-score">'+tot+'/'+maxTotal+'</div></div>';});lbTimer=setTimeout(()=>renderLB(filter),8000);}
function tvTab(id,el){document.querySelectorAll('.tv-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.querySelectorAll('.tv-panel').forEach(p=>p.classList.remove('active'));document.getElementById('tv-'+id).classList.add('active');}
function cfBtns(af,fn){return '<div class="class-filter">'+['all','p1','p3','p4'].map(f=>'<button class="cf-btn'+(af===f?' active':'')+'" onclick="'+fn+'(\''+f+'\')">'+(f==='all'?'All':CLASSES[f]?CLASSES[f].label:f)+'</button>').join('')+'</div>';}
function filterS(f){return f==='all'?students:students.filter(s=>s.classId===f);}
function renderTeacher(){renderOverview('all');renderRoster('all');renderStruggles('all');renderResponses('all');}
function renderOverview(f){const data=filterS(f);const tot=data.length;const maxT=MAX_PTS*5;const avg=tot?Math.round(data.reduce((a,s)=>a+getTotal(s),0)/tot):0;const pass=data.filter(s=>getTotal(s)>=(maxT*0.8)).length;document.getElementById('tv-overview').innerHTML=cfBtns(f,'renderOverview')+'<div class="tv-summary-grid"><div class="tv-metric"><div class="num">'+tot+'</div><div class="lbl-sm">Students</div></div><div class="tv-metric"><div class="num">'+avg+'</div><div class="lbl-sm">Avg / '+maxT+'</div></div><div class="tv-metric"><div class="num">'+pass+'</div><div class="lbl-sm">Scoring 80%+</div></div><div class="tv-metric"><div class="num">'+(tot?Math.round(pass/tot*100):0)+'%</div><div class="lbl-sm">Pass rate</div></div></div><div class="note-box"><strong style="color:#1a1a1a;">Scoring:</strong> Each round = '+MAX_PTS+' pts (2 per component: R, A, T\u2192C, C, E, T\u2192S, S). Total = '+maxT+' pts.<br><strong style="color:#1a1a1a;">Grading:</strong> 63\u201370 = A (MVP) \u00b7 52\u201362 = B (Starter) \u00b7 42\u201351 = C (Bench) \u00b7 below 42 = Needs Support<br><strong style="color:#1a1a1a;">Standard (P1 &amp; P4):</strong> 8/14 per round \u00a0|\u00a0 <strong style="color:#1a1a1a;">Honors (P3):</strong> 9/14 per round</div>';}
function renderRoster(f){const data=filterS(f);const maxT=MAX_PTS*5;if(!data.length){document.getElementById('tv-roster').innerHTML=cfBtns(f,'renderRoster')+'<p style="color:#666;font-size:14px;">No students yet.</p>';return;}let h=cfBtns(f,'renderRoster')+'<table class="roster-table"><thead><tr><th>Name</th><th>Class</th><th>Nickname</th><th>Total</th><th>Grade</th>';for(let i=0;i<5;i++)h+='<th>R'+(i+1)+'</th>';h+='<th>Attempts</th></tr></thead><tbody>';data.forEach(s=>{const tot=getTotal(s);const pct=tot/maxT;const g=pct>=0.9?'A':pct>=0.74?'B':pct>=0.6?'C':'D';const cc=pct>=0.74?'sc-hi':pct>=0.6?'sc-mid':'sc-lo';const cl=CLASSES[s.classId];const isHon=cl&&cl.honors;h+='<tr><td style="font-weight:600;">'+s.name+'</td><td><span class="sc-chip '+(isHon?'sc-hi':'sc-mid')+'">'+(cl?cl.label:s.classId)+'</span></td><td style="color:#666;font-size:12px;">'+s.nickname+'</td><td>'+tot+'/'+maxT+'</td><td><span class="sc-chip '+cc+'">'+g+'</span></td>';for(let i=0;i<5;i++){const r=s.rounds.find(x=>x.round===i);h+='<td>'+(r?r.score+'/'+MAX_PTS:'\u2014')+'</td>';}h+='<td>'+s.rounds.reduce((a,r)=>a+(r.attempts||1),0)+'</td></tr>';});h+='</tbody></table>';document.getElementById('tv-roster').innerHTML=h;}
function renderStruggles(f){const data=filterS(f);const totals={R:[],A:[],TC:[],C:[],E:[],TS:[],S:[]};data.forEach(s=>s.rounds.forEach(r=>{if(r.sbs)r.sbs.forEach(it=>{if(totals[it.key]!==undefined)totals[it.key].push(it.pts);});}));const labels={R:'R \u2014 Restate',A:'A \u2014 Answer',TC:'T\u2192C \u2014 Transition to cite',C:'C \u2014 Cite',E:'E \u2014 Explain',TS:'T\u2192S \u2014 Transition to summarize',S:'S \u2014 Summarize'};let h=cfBtns(f,'renderStruggles')+'<div>';['R','A','TC','C','E','TS','S'].forEach(k=>{const arr=totals[k];const avg=arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;const pct=Math.round(avg/2*100);h+='<div class="rbar-row"><div style="min-width:180px;font-size:12px;font-weight:600;color:'+BAR_COLORS[k]+';">'+labels[k]+'</div><div class="rbar-track"><div class="rbar-fill" style="width:'+pct+'%;background:'+BAR_COLORS[k]+';"></div></div><div class="rbar-pct">'+pct+'%</div></div>';});h+='</div>';const low=['R','A','TC','C','E','TS','S'].filter(k=>{const arr=totals[k];return arr.length&&arr.reduce((a,b)=>a+b,0)/arr.length<1.2;});if(low.length){h+='<div style="margin-top:1rem;"><div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:8px;">Components needing attention</div>';low.forEach(k=>{h+='<span class="strug-tag">'+labels[k]+'</span>';});h+='</div>';}document.getElementById('tv-struggles').innerHTML=h;}
function renderResponses(f){const data=filterS(f);if(!data.length){document.getElementById('tv-responses').innerHTML=cfBtns(f,'renderResponses')+'<p style="color:#666;font-size:14px;">No responses yet.</p>';return;}const maxT=MAX_PTS*5;const keyLabels={R:'R',A:'A',TC:'T\u2192C',C:'C',E:'E (Says/Means/Matters)',TS:'T\u2192S',S:'S'};let h=cfBtns(f,'renderResponses');data.forEach(s=>{const tot=getTotal(s);const cl=CLASSES[s.classId];const isHon=cl&&cl.honors;h+='<div class="resp-card"><div class="resp-hdr" onclick="this.nextElementSibling.classList.toggle(\'open\');this.querySelector(\'.tog\').textContent=this.nextElementSibling.classList.contains(\'open\')?\'\u25b2 Hide\':\'\u25bc Show\';"><div style="font-weight:600;font-size:15px;">'+s.name+' <span class="sc-chip '+(isHon?'sc-hi':'sc-mid')+'" style="margin-left:4px;font-size:11px;">'+(cl?cl.label:s.classId)+'</span> \u2014 '+tot+'/'+maxT+'</div><span class="tog" style="font-size:13px;color:#aaa;">\u25bc Show</span></div><div class="resp-body">';s.rounds.forEach(r=>{h+='<div style="border-top:0.5px solid rgba(0,0,0,0.08);padding:10px 0 4px;"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:4px;">Round '+(r.round+1)+' \u2014 '+r.theme+' \u2014 '+r.score+'/'+MAX_PTS+' ('+(r.attempts||1)+' attempt'+((r.attempts||1)>1?'s':'')+')</div><div style="font-size:12px;color:#aaa;margin-bottom:6px;font-style:italic;">'+r.question+'</div>';['R','A','TC','C','E','TS','S'].forEach(k=>{const v=r.responses?r.responses[k]:'';if(v)h+='<div class="resp-item"><strong>'+keyLabels[k]+':</strong> '+v+'</div>';});h+='</div>';});h+='</div></div>';});document.getElementById('tv-responses').innerHTML=h;}
function exportSummary(){const maxT=MAX_PTS*5;let txt='RACES CHECKER \u2014 TEACHER EXPORT\n'+new Date().toLocaleDateString()+'\n\n';txt+='Scoring: '+MAX_PTS+' pts/round (R,A,T\u2192C,C,E,T\u2192S,S = 2pts each). Total: '+maxT+' pts.\n';txt+='Scale: 63-70=A 52-62=B 42-51=C <42=Needs Support\nStandard gate: 8/14 | Honors gate: 9/14\n\n';students.forEach(s=>{const tot=getTotal(s);const cl=CLASSES[s.classId];txt+=(s.name).padEnd(26)+((cl?cl.label:s.classId)).padEnd(12)+(tot+'/'+maxT).padEnd(8)+'\n';s.rounds.forEach(r=>{txt+='  R'+(r.round+1)+' ('+r.theme+'): '+r.score+'/'+MAX_PTS+' \u2014 '+(r.attempts||1)+' attempt(s)\n';['R','A','TC','C','E','TS','S'].forEach(k=>{const v=r.responses?r.responses[k]:'';if(v)txt+='    '+k+': '+v+'\n';});});txt+='\n';});const b=new Blob([txt],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='races_export.txt';a.click();}
</script>
